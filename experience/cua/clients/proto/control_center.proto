// proto/control_center.proto
// Complete Protocol Buffer Definitions v3.0
// Includes: Identification, Monitoring, Connection Tracking,
//           Agent Management, Connection History

syntax = "proto3";

package control_center;

// ============================================================================
// IDENTIFICATION MESSAGES
// ============================================================================

// Server identity - persistent across restarts
message ServerIdentity {
  string server_id = 1;           // UUID, persisted in config file
  string hostname = 2;            // Server machine hostname
  string listen_address = 3;      // IP:Port server listens on
  string version = 4;             // Control Center version
  int64 started_at = 5;           // Unix timestamp when started
  string network = 6;             // Network identifier (e.g., "datacenter-east", "vpc-prod")
}

// Agent identity - provided during registration
message AgentIdentity {
  string agent_id = 1;            // UUID generated by agent
  string hostname = 2;            // Agent machine hostname
  OSType os_type = 3;             // Operating system type
  string os_version = 4;          // Detailed OS version
  string ip_address = 5;          // Agent's IP address (as detected)
  string version = 6;             // Control Center version
  repeated string capabilities = 7; // ["mouse", "keyboard", "position_tracking"]
  map<string, string> metadata = 8; // Custom key-value pairs
}

// Connection metadata - tracks active connection
message ConnectionMetadata {
  string connection_id = 1;       // UUID for this connection session
  string server_id = 2;           // Which server
  string agent_id = 3;            // Which agent
  string agent_hostname = 4;      // Agent machine name
  string agent_ip = 5;            // Agent IP address
  string server_ip = 6;           // Server IP address
  string network = 7;             // Network identifier
  int64 connected_at = 8;         // Unix timestamp
  int64 last_heartbeat = 9;       // Last activity timestamp
  uint64 commands_executed = 10;  // Command counter
  ConnectionState state = 11;     // Connection state
}

// Connection state enum
enum ConnectionState {
  CONNECTING = 0;
  CONNECTED = 1;
  ACTIVE = 2;           // Actively executing commands
  IDLE = 3;             // Connected but idle
  DISCONNECTING = 4;
  DISCONNECTED = 5;
  ERROR = 6;
}

// ============================================================================
// REGISTRATION MESSAGES
// ============================================================================

// Agent registration request
message RegistrationRequest {
  AgentIdentity agent_identity = 1;
  string auth_token = 2;          // Authentication token
  map<string, string> connection_params = 3; // Additional parameters
}

// Agent registration response
message RegistrationResponse {
  bool success = 1;
  string message = 2;
  string connection_id = 3;       // UUID for this connection
  ServerIdentity server_identity = 4; // Server info sent to agent
  ConnectionMetadata connection_metadata = 5;
}

// ============================================================================
// COMMAND EXECUTION MESSAGES
// ============================================================================

// Command request from CLI to server
message CommandRequest {
  string id = 1;                  // Command UUID
  string command = 2;             // Command string
  optional string user_id = 3;    // User who issued command
  int64 timestamp = 4;            // When command was issued
}

// Command response from agent to server
message CommandResponse {
  string id = 1;                  // Matches CommandRequest.id
  bool success = 2;
  string message = 3;
  int64 execution_time_ms = 4;
  optional int32 mouse_x = 5;
  optional int32 mouse_y = 6;
  optional bool position_captured = 7;
  map<string, string> metadata = 8; // Additional response data
}

// ============================================================================
// HEARTBEAT & HEALTH MESSAGES
// ============================================================================

// Agent heartbeat
message AgentHeartbeat {
  string connection_id = 1;
  int64 timestamp = 2;
  AgentStatus status = 3;
  optional string current_command_id = 4;
}

// Agent status
message AgentStatus {
  bool ready = 1;
  uint64 commands_executed = 2;
  uint64 commands_failed = 3;
  int64 uptime_seconds = 4;
  map<string, string> system_info = 5; // CPU, memory, etc.
}

// Server heartbeat
message ServerHeartbeat {
  string server_id = 1;
  int64 timestamp = 2;
  ServerStatus status = 3;
}

// Server status
message ServerStatus {
  bool accepting_connections = 1;
  bool agent_connected = 2;
  uint64 total_commands_processed = 3;
  int64 uptime_seconds = 4;
}

// ============================================================================
// MONITORING & QUERY MESSAGES
// ============================================================================

// Query connection status
message ConnectionQuery {
  optional string server_id = 1;  // Filter by server
  optional string agent_id = 2;   // Filter by agent
  optional string network = 3;    // Filter by network
}

// Connection status response
message ConnectionStatusResponse {
  repeated ConnectionMetadata connections = 1;
  int32 total_count = 2;
}

// Query server status
message ServerStatusQuery {
  optional string server_id = 1;
  optional string network = 2;
}

// Server status response
message ServerStatusResponse {
  repeated ServerInfo servers = 1;
  int32 total_count = 2;
}

// Server info for monitoring
message ServerInfo {
  ServerIdentity identity = 1;
  ServerStatus status = 2;
  optional ConnectionMetadata current_connection = 3;
  int64 last_seen = 4;
}

// ============================================================================
// AGENT MANAGEMENT MESSAGES
// ============================================================================

// Request to forcefully disconnect the current agent
message DisconnectAgentRequest {
  string connection_id = 1;   // Connection ID to disconnect (empty = disconnect current)
  string reason = 2;          // Reason for disconnection (for audit log)
}

// Response to disconnect request
message DisconnectAgentResponse {
  bool success = 1;
  string message = 2;
  string disconnected_connection_id = 3; // The connection ID that was disconnected
}

// ============================================================================
// CONNECTION HISTORY MESSAGES
// ============================================================================

// A single historical connection record
message HistoricalConnection {
  string connection_id = 1;
  string agent_id = 2;
  string agent_hostname = 3;
  string agent_ip = 4;
  int32 os_type = 5;
  string os_version = 6;
  repeated string capabilities = 7;
  string server_ip = 8;
  int64 connected_at = 9;
  optional int64 disconnected_at = 10;
  uint64 commands_executed = 11;
  optional string disconnect_reason = 12;
}

// Request connection history
message ConnectionHistoryRequest {
  optional int32 limit = 1;   // Max records to return (default: 50, max: 500)
}

// Connection history response
message ConnectionHistoryResponse {
  repeated HistoricalConnection connections = 1;
  int32 total_count = 2;
}

// ============================================================================
// STREAM MESSAGES
// ============================================================================

// Agent to server message (upstream)
message AgentMessage {
  string connection_id = 1;
  oneof payload {
    CommandResponse command_response = 2;
    AgentHeartbeat heartbeat = 3;
    AgentStatus status_update = 4;
    DisconnectNotice disconnect = 5;
  }
}

// Server to agent message (downstream)
message ServerMessage {
  oneof payload {
    CommandRequest command_request = 1;
    ServerHeartbeat heartbeat = 2;
    DisconnectNotice disconnect = 3;
    ConfigUpdate config_update = 4;
  }
}

// Disconnect notice
message DisconnectNotice {
  string reason = 1;
  int64 timestamp = 2;
  bool graceful = 3;
}

// Config update (for dynamic reconfiguration)
message ConfigUpdate {
  map<string, string> settings = 1;
}

// ============================================================================
// EXISTING MESSAGES (KEPT FOR COMPATIBILITY)
// ============================================================================

message AgentInfoRequest {
  // Empty - legacy
}

message AgentInfo {
  OSType os = 1;
  string os_version = 2;
  repeated string capabilities = 3;
  string agent_version = 4;
}

enum OSType {
  WINDOWS = 0;
  MACOS = 1;
  LINUX = 2;
}

message InfoRequest {
  // Empty
}

message ExecuteRequest {
  string id = 1;
  string command = 2;
  optional string user_id = 3;
}

message ExecuteResponse {
  string id = 1;
  bool success = 2;
  string message = 3;
  int64 execution_time_ms = 4;
  optional int32 mouse_x = 5;
  optional int32 mouse_y = 6;
  optional bool position_captured = 7;
}

message PingRequest {
  // Empty
}

message PongResponse {
  bool alive = 1;
}

message MonitorRequest {
  // Empty
}

message ConnectionStatus {
  bool connected = 1;
  string message = 2;
  int64 timestamp = 3;
}

// ============================================================================
// METRICS MESSAGES
// ============================================================================

// Metrics request
message MetricsRequest {
  // Empty - could add filters in future (e.g., filter by metric type)
}

// Metrics response in Prometheus format
message MetricsResponse {
  string metrics = 1;           // Prometheus-formatted metrics text
  int64 timestamp = 2;          // Unix timestamp when metrics were collected
}

// ============================================================================
// WATCH COMMANDS MESSAGES
// ============================================================================

// Request to start watching commands — no auth needed, read-only
message WatchRequest {
  // Empty — no filtering, no auth required
}

// Live command event streamed to Memory Archive
message CommandEvent {
  // Identity
  string session_id = 1;          // Active session UUID
  string agent_id = 2;            // Agent machine UUID
  string agent_version = 3;       // Control Center agent version
  string os_type = 4;             // WINDOWS / MACOS / LINUX

  // Timing
  string timestamp = 5;           // ISO 8601 with milliseconds e.g. "2026-02-25T12:58:04.286Z"

  // Command — raw input only
  string raw_command = 6;         // Exactly as typed e.g. "^a", "here left", "type hello"
  string action_type = 7;         // "mouse" / "keyboard" / "position"
  string action_subtype = 8;      // "left", "right", "double", "type", "press" etc.
  bool is_here_command = 9;       // true if command used "here" keyword

  // Result
  bool success = 10;
  string error_message = 11;      // Empty string if success=true
  int32 execution_time_ms = 12;

  // Spatial — populated for mouse commands only
  int32 mouse_x = 13;
  int32 mouse_y = 14;
  bool position_captured = 15;    // true if mouse_x/mouse_y are real coordinates

  // Health
  bool is_heartbeat = 16;         // true = keep-alive ping (every 5s when idle), false = real command
  bool agent_alive = 17;          // Always true while stream is open; stream closes on agent disconnect
}

// ============================================================================
// SERVICE DEFINITIONS
// ============================================================================

// Main control service (server-side)
service ControlService {
  // Agent registration (agent calls this when connecting)
  rpc RegisterAgent(RegistrationRequest) returns (RegistrationResponse);

  // Bidirectional stream between agent and server
  rpc AgentStream(stream AgentMessage) returns (stream ServerMessage);

  // Execute command (CLI to server)
  rpc ExecuteCommand(CommandRequest) returns (CommandResponse);

  // Monitor connection (CLI to server)
  rpc MonitorConnection(MonitorRequest) returns (stream ConnectionStatus);

  // Query connection status (for monitoring) - no auth required
  rpc QueryConnections(ConnectionQuery) returns (ConnectionStatusResponse);

  // Query server status (for monitoring) - no auth required
  rpc QueryServers(ServerStatusQuery) returns (ServerStatusResponse);

  // Get server identity - no auth required
  rpc GetServerIdentity(InfoRequest) returns (ServerIdentity);

  // Disconnect the currently connected agent - requires auth
  rpc DisconnectAgent(DisconnectAgentRequest) returns (DisconnectAgentResponse);

  // Get connection history - no auth required
  rpc GetConnectionHistory(ConnectionHistoryRequest) returns (ConnectionHistoryResponse);

  // Legacy compatibility
  rpc GetAgentInfo(AgentInfoRequest) returns (AgentInfo);
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);
  rpc Ping(PingRequest) returns (PongResponse);

  // Get server metrics (Prometheus format) - requires auth + metrics scope
  rpc GetMetrics(MetricsRequest) returns (MetricsResponse);

  // Watch live command events — for Memory Archive (no auth required)
  // Stream closes automatically when agent disconnects.
  // Heartbeat events (is_heartbeat=true) fire every 5s when idle.
  rpc WatchCommands(WatchRequest) returns (stream CommandEvent);
}

// Agent service (agent-side) - kept for backwards compatibility if needed
service AgentService {
  rpc GetInfo(InfoRequest) returns (AgentInfo);
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);
  rpc Ping(PingRequest) returns (PongResponse);
}
