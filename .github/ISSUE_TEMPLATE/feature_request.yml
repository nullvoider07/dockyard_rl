name: Feature request
description: Propose an enhancement or new capability
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What is missing or hard to do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: The change you'd like, and any alternatives considered.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - algorithms (GRPO / loss)
        - models (generation / policy / dtensor)
        - models/jax (Flax NNX backend)
        - distributed / cluster
        - data / environments / rewards
        - sandbox / ubuntu-base
        - infra (Kubernetes / Slurm)
        - docs
        - other
    validations:
      required: true
