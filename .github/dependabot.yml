version: 2

updates:
  # Root package — local-dev / CI dependencies (runtime deps are baked into the
  # ubuntu-swe image, not pinned here).
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies]
    commit-message:
      prefix: deps
    groups:
      # Consolidate non-breaking bumps into one PR; majors stay individual
      # so each gets its own review.
      minor-and-patch:
        patterns: ["*"]
        update-types: [minor, patch]

  # Documentation build toolchain.
  - package-ecosystem: pip
    directory: /docs
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, docs]
    commit-message:
      prefix: "deps(docs)"
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: [minor, patch]

  # Kubernetes deployment CLI (operator-host tool).
  - package-ecosystem: pip
    directory: /infra/dockyard_k8s
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, infra]
    commit-message:
      prefix: "deps(infra)"
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: [minor, patch]

  # GitHub Actions used by the workflows below.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, ci]
    commit-message:
      prefix: ci
    groups:
      # One consolidated PR for all action bumps instead of one per action.
      github-actions:
        patterns: ["*"]
