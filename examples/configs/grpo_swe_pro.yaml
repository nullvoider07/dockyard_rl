# GRPO configuration for SWE-bench Pro coding-agent training.
#
# Pro is scored inside prebuilt per-instance Docker images (image mode), not the
# clone path. Prerequisites on the sandbox fleet:
#   - swe_bench_pro_setup.sh has populated the per-instance harness dir
#     (set DOCKYARD_SWE_BENCH_PRO_SCRIPTS_DIR or data.train.scripts_dir).
#   - the sandbox container runs privileged (dockerd-in-container) with scratch
#     for /var/lib/docker; tune the image cache via
#     DOCKYARD_SANDBOX_IMAGE_CACHE_MAX_GB / DOCKYARD_SANDBOX_IMAGE_PULL_TIMEOUT.
#
# Topology: non-collocated, async GRPO, vLLM async engine.
# Target hardware: 4 nodes × 8 GPUs (3 trainer + 1 inference).
#
# Usage:
#   python3 examples/run_grpo_swe.py \
#     --config examples/configs/grpo_swe_pro.yaml \
#     cluster.gpus_per_node=8 \
#     cluster.num_nodes=4

grpo:
  num_prompts_per_step: 16
  num_generations_per_prompt: 8
  max_rollout_turns: 1               # single-shot: agent emits one patch, then scored
  max_num_epochs: 1
  max_num_steps: 2000
  normalize_rewards: true
  use_leave_one_out_baseline: true
  val_period: 50
  val_at_start: true
  val_at_end: true
  max_val_samples: 64
  val_batch_size: 8
  seed: 42
  use_dynamic_sampling: false
  dynamic_sampling_max_gen_batches: 10
  batch_multiplier: 1
  overlong_filtering: true
  seq_logprob_error_threshold: 1.5

  adv_estimator:
    name: "grpo"
    normalize_rewards: ${grpo.normalize_rewards}
    use_leave_one_out_baseline: ${grpo.use_leave_one_out_baseline}
    minus_baseline: true

  reward_shaping:
    enabled: true
    overlong_buffer_length: 256
    overlong_buffer_penalty: 1.0
    max_response_length: ${policy.max_total_sequence_length}
    stop_properly_penalty_coef: null

  reward_scaling:
    enabled: false
    source_min: 0.0
    source_max: 1.0
    target_min: 0.0
    target_max: 1.0

  async_grpo:
    enabled: true
    max_trajectory_age_steps: 2
    in_flight_weight_updates: true
    recompute_kv_cache_after_weight_updates: true

loss_fn:
  reference_policy_kl_penalty: 0.01
  reference_policy_kl_type: "k3"
  kl_input_clamp_value: 20.0
  kl_output_clamp_value: 10.0
  ratio_clip_min: 0.2
  ratio_clip_max: 0.2
  ratio_clip_c: null
  use_on_policy_kl_approximation: false
  use_importance_sampling_correction: true
  truncated_importance_sampling_type: null
  truncated_importance_sampling_ratio: null
  truncated_importance_sampling_ratio_min: null
  sequence_level_importance_ratios: false
  token_level_loss: true
  force_on_policy_ratio: false
  use_kl_in_reward: false

checkpointing:
  enabled: true
  checkpoint_dir: "results/grpo-swe-pro"
  metric_name: "val:accuracy"
  higher_is_better: true
  keep_top_k: 3
  save_period: 50
  checkpoint_must_save_by: null
  model_save_format: "safetensors"
  save_consolidated: false
  save_optimizer: true

policy:
  model_name: "Qwen/Qwen2.5-7B-Instruct"
  tokenizer:
    name: ${policy.model_name}
    chat_template: null
    chat_template_kwargs: null
  hf_config_overrides: {}
  train_global_batch_size: 128
  train_micro_batch_size: 2
  logprob_batch_size: ${policy.train_micro_batch_size}
  # Pro prompts (problem_statement + requirements + interface) run longer than
  # SWE-bench Lite, so the context window is larger here.
  max_total_sequence_length: 16384
  precision: "bfloat16"
  logprob_chunk_size: null
  offload_optimizer_for_logprob: true
  max_grad_norm: 1.0
  make_sequence_length_divisible_by: ${policy.dtensor_cfg.tensor_parallel_size}

  dtensor_cfg:
    _v2: true
    enabled: true
    cpu_offload: false
    sequence_parallel: false
    activation_checkpointing: true
    tensor_parallel_size: 1
    context_parallel_size: 1
    custom_parallel_plan: null
    automodel_kwargs: {}
    lora_cfg:
      enabled: false
      target_modules: []
      exclude_modules: []
      match_all_linear: true
      dim: 8
      alpha: 32
      dropout: 0.0
      dropout_position: "post"
      lora_A_init: "xavier"
      use_triton: true

  megatron_cfg:
    enabled: false

  draft:
    enabled: false
    model_name: null
    loss_weight: 0.1
    num_layers: null
    aux_layer_indices: null

  dynamic_batching:
    enabled: false
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    sequence_length_round: 64

  sequence_packing:
    enabled: true
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    algorithm: "modified_first_fit_decreasing"
    sequence_length_round: 64

  optimizer:
    name: "torch.optim.AdamW"
    kwargs:
      lr: 3.0e-7
      weight_decay: 0.01
      betas: [0.9, 0.999]
      eps: 1.0e-8
      foreach: false
      fused: false

  scheduler:
    - name: "torch.optim.lr_scheduler.LinearLR"
      kwargs:
        start_factor: 0.1
        end_factor: 1.0
        total_iters: 20
    - name: "torch.optim.lr_scheduler.ConstantLR"
      kwargs:
        factor: 1.0
        total_iters: 10000000000
    - milestones: [20]

  generation:
    backend: "vllm"
    max_new_tokens: ${policy.max_total_sequence_length}
    temperature: 1.0
    top_p: 1.0
    top_k: null
    stop_token_ids: null
    stop_strings: null
    vllm_cfg:
      async_engine: true
      precision: ${policy.precision}
      kv_cache_dtype: "auto"
      tensor_parallel_size: 1
      pipeline_parallel_size: 1
      expert_parallel_size: 1
      gpu_memory_utilization: 0.85
      max_model_len: ${policy.max_total_sequence_length}
      enforce_eager: false
      enable_prefix_caching: true
      enable_vllm_metrics_logger: true
      vllm_metrics_logger_interval: 1.0
    vllm_kwargs: {}
    colocated:
      enabled: false
      resources:
        gpus_per_node: 8
        num_nodes: 1

data:
  max_input_seq_length: ${policy.max_total_sequence_length}
  shuffle: true
  num_workers: 2
  use_multiple_dataloader: false

  train:
    dataset_name: "swe_bench_pro"                  # DATASET_REGISTRY key → SWEBenchProDataset
    hf_dataset_name: "ScaleAI/SWE-bench_Pro"        # HF path passed to the loader
    split: "test"
    max_prompt_length: 12288
    shuffle_seed: ${grpo.seed}
    # Per-instance harness dir from swe_bench_pro_setup.sh. null → read from the
    # DOCKYARD_SWE_BENCH_PRO_SCRIPTS_DIR environment variable.
    scripts_dir: null
    image_registry: "jefzda/sweap-images"

  validation:
    dataset_name: "swe_bench_pro"
    hf_dataset_name: "ScaleAI/SWE-bench_Pro"
    split: "test"
    max_prompt_length: 12288
    subset_size: 64
    scripts_dir: null
    image_registry: "jefzda/sweap-images"

  default:
    processor: "swe_bench_pro_data_processor"
    env_name: "code"

env:
  code:
    num_workers: 16
    # "binary" → 1.0 when resolved else 0.0; "test_pass_rate" → pass fraction.
    reward_mode: "binary"
    # Build the SWE-bench Pro image-mode reward (named-test resolution).
    reward_kind: "swe_bench_pro"
    # Zero the reward when the agent patch modifies a held-out test file.
    integrity_check: true
    # Per-task wall-clock timeout (seconds). Larger than Lite: covers the
    # in-container setup (npm install, etc.) on top of the test run; the image
    # pull has its own separate budget.
    task_timeout: 1800
    sandbox_urls:
      - "http://localhost:9090"

logger:
  log_dir: "logs/grpo-swe-pro"
  num_val_samples_to_print: 3
  wandb_enabled: false
  tensorboard_enabled: true
  mlflow_enabled: false
  swanlab_enabled: false
  monitor_gpus: true
  wandb:
    project: "dockyard-rl"
    name: "grpo-swe-pro"
  tensorboard: {}
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10

cluster:
  gpus_per_node: 8
  num_nodes: 4
