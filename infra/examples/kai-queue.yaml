# Example KAI Scheduler queue hierarchy for a small GPU cluster.
# Adapt the queue names, quotas, and priorities to match your cluster.
#
# Queue hierarchy:
#   root (root, unlimited)
#   ├── rl       (1 GPU guaranteed, burst to 2, priority 200, weight 2)
#   └── backfill (0 GPU guaranteed, burst to 2, priority 50, weight 1)
#
# rl: gets its guaranteed GPU first, gets surplus before backfill, and is
#   reclaimed last. Jobs are protected from preemption for 4 hours.
# backfill: best-effort — uses idle GPUs, first to be reclaimed.
#
# The dockyard_rl manifests label workloads with `kai.scheduler/queue: rl`.

apiVersion: scheduling.run.ai/v2
kind: Queue
metadata:
  name: root
spec:
  resources:
    gpu:    { quota: -1, limit: -1, overQuotaWeight: 1 }
    cpu:    { quota: -1, limit: -1, overQuotaWeight: 1 }
    memory: { quota: -1, limit: -1, overQuotaWeight: 1 }
---
apiVersion: scheduling.run.ai/v2
kind: Queue
metadata:
  name: rl
spec:
  parentQueue: root
  priority: 200
  preemptMinRuntime: "4h"
  reclaimMinRuntime: "15m"
  resources:
    gpu:    { quota: 1, limit: 2, overQuotaWeight: 2 }
    cpu:    { quota: -1, limit: -1, overQuotaWeight: 2 }
    memory: { quota: -1, limit: -1, overQuotaWeight: 2 }
---
apiVersion: scheduling.run.ai/v2
kind: Queue
metadata:
  name: backfill
spec:
  parentQueue: root
  priority: 50
  preemptMinRuntime: "4h"
  reclaimMinRuntime: "15m"
  resources:
    gpu:    { quota: 0, limit: 2, overQuotaWeight: 1 }
    cpu:    { quota: -1, limit: -1, overQuotaWeight: 1 }
    memory: { quota: -1, limit: -1, overQuotaWeight: 1 }
